name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "scripts/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "scripts/**"
      - "LICENSE"

# A new push supersedes any still-running build for the same ref — Windows
# and macOS runners are expensive (2x/10x minute multipliers on private
# repos) and a stale commit's result is worthless.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap, fast typecheck job that doesn't need a Rust toolchain or a built
  # Rust binary — catches TS errors in the MCP server without waiting on
  # the platform build jobs below.
  typecheck-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        working-directory: mcp
        run: npx tsc -p . --noEmit

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp
      # apple-metal 0.8.8 (pulled in by screencapturekit) compiles a Swift bridge
      # that references MTLSamplerReductionMode, a symbol that exists only in the
      # macOS 26 SDK. GitHub's macOS runners ship several Xcodes and `xcode-select`
      # may default to an older one, so this build was a coin flip: it passed only
      # while rust-cache still held a prebuilt apple-metal, and died with
      # "cannot find 'MTLSamplerReductionMode' in scope" on the first cache miss
      # (the same shape as the OpenSSL bug in this workflow — latent, masked by
      # caching, surfaced by the first cache miss).
      # Pin the newest installed Xcode and fail loudly if its SDK is too old.
      - name: Select newest Xcode (apple-metal needs the macOS 26 SDK)
        run: |
          set -euo pipefail
          # if/else rather than `[ -n "$XC" ] && sudo ...` purely for legibility and
          # so a runner without a versioned Xcode says so out loud. (set -e would
          # NOT abort on the && form: bash exempts a command preceding && from
          # errexit. Verified, rather than assumed.)
          XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then
            sudo xcode-select -s "$XC"
          else
            echo "no /Applications/Xcode_*.app found; using the default toolchain"
          fi
          xcodebuild -version
          SDK=$(xcrun --show-sdk-version)
          echo "selected macOS SDK: $SDK"
          MAJOR=${SDK%%.*}
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::macOS SDK $MAJOR is too old for apple-metal 0.8.8 (needs MTLSamplerReductionMode from the macOS 26 SDK). Xcodes present: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')"
            exit 1
          fi

      # MUST precede any cargo invocation that can compile llama-cpp-sys-2 — its
      # build script compiles llama.cpp's vendored cpp-httplib, which needs
      # openssl/err.h. This step used to sit *after* `cargo test`, and got away
      # with it only while rust-cache had the build script's output cached: a
      # cancelled run saves no cache, so the next run compiled cold and died with
      # "fatal error: 'openssl/err.h' file not found".
      - name: OpenSSL headers for llama.cpp vendored httplib (macOS 26 runners)
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "CPATH=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"

      - name: cargo test --release (workspace)
        run: cargo test --release --workspace

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (aarch64, unsigned/local build — no notarization in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-aarch64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

  # Intel Mac, cross-compiled from the arm64 macos-latest runner (GitHub
  # doesn't offer an Intel macOS hosted runner anymore). No Metal (Apple
  # Silicon-oriented; see crates/flow-core/Cargo.toml's target_arch split),
  # so cleanup runs llama.cpp CPU-only. Bigger gap: ort (transcribe-rs's
  # ONNX backend) ships NO prebuilt binaries at all for x86_64-apple-darwin
  # (verified: `cargo check --target x86_64-apple-darwin` fails with "ort
  # does not provide prebuilt binaries for the target x86_64-apple-darwin").
  # Worked around with ORT_STRATEGY=system, linking against Microsoft's own
  # official osx-x86_64 ONNX Runtime release instead of ort's download-CDN
  # path — see https://github.com/microsoft/onnxruntime/releases. The
  # resulting binaries reference the dylib via @rpath with no rpath entry
  # set (system-strategy doesn't wire one), so it's added by hand and the
  # dylib is bundled into the .app/Frameworks below; otherwise the shipped
  # .dmg would fail to launch on a real Intel Mac with a dyld error.
  #
  # Cross-compiled test binaries can't run on the arm64 host (no Rosetta in
  # this runner image), so this job builds/packages only — it does not run
  # `cargo test`. It has never been run, or its output executed, on real or
  # emulated Intel hardware; see the README hardware compat matrix.
  macos-x64:
    runs-on: macos-latest
    env:
      ORT_STRATEGY: system
      ORT_PREFER_DYNAMIC_LINK: "1"
      ONNXRUNTIME_VERSION: "1.22.0"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Download Microsoft's official ONNX Runtime (osx-x86_64) — ort has no prebuilt binaries for this target
        run: |
          mkdir -p /tmp/ort-x64
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-osx-x86_64-${ONNXRUNTIME_VERSION}.tgz" \
            | tar xz -C /tmp/ort-x64 --strip-components=1
          ls /tmp/ort-x64/lib
          echo "ORT_LIB_PATH=/tmp/ort-x64/lib" >> "$GITHUB_ENV"
          DYLIB=$(find /tmp/ort-x64/lib -name 'libonnxruntime.*.dylib' | head -n1)
          [ -n "$DYLIB" ] || { echo "::error::libonnxruntime dylib not found under /tmp/ort-x64/lib after extracting the release tarball"; exit 1; }
          echo "ORT_DYLIB=$DYLIB" >> "$GITHUB_ENV"

      # apple-metal 0.8.8 (pulled in by screencapturekit) compiles a Swift bridge
      # that references MTLSamplerReductionMode, a symbol that exists only in the
      # macOS 26 SDK. GitHub's macOS runners ship several Xcodes and `xcode-select`
      # may default to an older one, so this build was a coin flip: it passed only
      # while rust-cache still held a prebuilt apple-metal, and died with
      # "cannot find 'MTLSamplerReductionMode' in scope" on the first cache miss
      # (the same shape as the OpenSSL bug in this workflow — latent, masked by
      # caching, surfaced by the first cache miss).
      # Pin the newest installed Xcode and fail loudly if its SDK is too old.
      - name: Select newest Xcode (apple-metal needs the macOS 26 SDK)
        run: |
          set -euo pipefail
          # if/else rather than `[ -n "$XC" ] && sudo ...` purely for legibility and
          # so a runner without a versioned Xcode says so out loud. (set -e would
          # NOT abort on the && form: bash exempts a command preceding && from
          # errexit. Verified, rather than assumed.)
          XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then
            sudo xcode-select -s "$XC"
          else
            echo "no /Applications/Xcode_*.app found; using the default toolchain"
          fi
          xcodebuild -version
          SDK=$(xcrun --show-sdk-version)
          echo "selected macOS SDK: $SDK"
          MAJOR=${SDK%%.*}
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::macOS SDK $MAJOR is too old for apple-metal 0.8.8 (needs MTLSamplerReductionMode from the macOS 26 SDK). Xcodes present: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')"
            exit 1
          fi

      - name: OpenSSL headers for llama.cpp vendored httplib (macOS 26 runners)
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "CPATH=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Same fix as release.yml's macos-x64 job (see the comment there for
      # the full incident writeup): a prior version of this step built the
      # .app AND cut the .dmg in one `cargo tauri build` call, then a later
      # step mutated the already-built .app — but the .dmg had already been
      # packaged from the pre-fixup app, so this job's uploaded dmg was
      # silently wrong on every CI run. Do both mutations BEFORE the bundler
      # cuts the dmg instead of after: RUSTFLAGS adds the rpath at link time
      # (the bundler's --config frameworks option does not run
      # install_name_tool for you), and --config bundle.macOS.frameworks
      # tells the bundler to copy the dylib into Contents/Frameworks and
      # sign it as part of its own ad-hoc signing pass. Scoped to this step
      # only — the aarch64 job statically links ort and has no frameworks
      # entry to add.
      - name: tauri build (x86_64, ad-hoc signed with onnxruntime bundled + rpath — cross-compiled)
        working-directory: apps/desktop
        env:
          # env RUSTFLAGS *replaces* .cargo/config.toml's rustflags rather than
          # appending — keep /usr/lib/swift (libswift_Concurrency, pulled in by
          # screencapturekit) or the x64 app dyld-aborts on it. See release.yml.
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,/usr/lib/swift -C link-arg=-Wl,-rpath,@executable_path/../Frameworks"
        run: |
          cargo tauri build --target x86_64-apple-darwin \
            --config "{\"bundle\":{\"macOS\":{\"frameworks\":[\"${ORT_DYLIB}\"]}}}"

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          DMG=$(find target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      # Mounts the actual dmg this job uploads (not the .app left behind in
      # bundle/macos/) so this check can't be fooled by the same
      # dmg-cut-before-fixup ordering bug it exists to catch.
      - name: Verify bundle (mounts the uploaded .dmg)
        run: |
          set -euo pipefail
          DMG="${{ steps.find_dmg.outputs.path }}"
          MOUNT=$(mktemp -d)
          cleanup() { hdiutil detach "$MOUNT" -quiet >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT" "$DMG"

          APP=$(find "$MOUNT" -maxdepth 1 -name '*.app' | head -n1)
          [ -n "$APP" ] || { echo "::error::no .app found inside $DMG"; exit 1; }

          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$APP/Contents/Info.plist" >/dev/null 2>&1 \
            || { echo "::error::NSMicrophoneUsageDescription missing from the dmg's app — the app will be killed by TCC the moment a user talks"; exit 1; }

          if codesign -dv --verbose=2 "$APP" 2>&1 | grep -q "Sealed Resources=none"; then
            echo "::error::dmg's bundle resources are not sealed — a quarantined download will fail Gatekeeper (\"app is damaged\") with no Open Anyway option"
            exit 1
          fi
          codesign --verify --deep --strict "$APP" \
            || { echo "::error::dmg's bundle signature does not verify"; exit 1; }

          DYLIB=$(find "$APP/Contents/Frameworks" -maxdepth 1 -name 'libonnxruntime.*.dylib' 2>/dev/null | head -n1)
          [ -n "$DYLIB" ] || { echo "::error::libonnxruntime dylib missing from dmg's Contents/Frameworks — the app will abort at dyld load"; exit 1; }
          RPATHS=$(otool -l "$APP/Contents/MacOS/vzt-flow-desktop" | grep -A2 LC_RPATH | grep "path " || true)
          grep -q "@executable_path/../Frameworks" <<<"$RPATHS" \
            || { echo "::error::dmg's binary has no @executable_path/../Frameworks LC_RPATH — dyld will fail to locate libonnxruntime at launch"; exit 1; }
          grep -q "/usr/lib/swift" <<<"$RPATHS" \
            || { echo "::error::dmg's binary lost its /usr/lib/swift LC_RPATH — dyld will fail on libswift_Concurrency.dylib. Did an env RUSTFLAGS clobber .cargo/config.toml?"; exit 1; }

          echo "bundle OK (verified inside dmg): mic purpose string present, resources sealed, signature verifies, onnxruntime dylib + rpath present"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-x86_64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

  # Linux x64. Built and tested in CI, but never run on real Linux hardware
  # (the dev machine is macOS) — see the README hardware compat matrix and
  # docs/USAGE-Linux.md for the honest X11-vs-Wayland support matrix. Produces
  # a .deb and an .AppImage; the Tauri tray needs libayatana-appindicator at
  # runtime, and the hold-to-talk hotkey uses tauri-plugin-global-shortcut's
  # X11 backend (Wayland is degraded to XWayland-only / tray-toggle).
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-unknown-linux-gnu
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Linux system dependencies (Tauri/WebKitGTK, tray appindicator, ALSA, X11 paste)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp
      - name: cargo test --release (workspace)
        run: cargo test --release --workspace --target x86_64-unknown-linux-gnu

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, .deb + .AppImage)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Locate deb/AppImage artifacts
        id: find_installers
        run: |
          # Cargo workspace: the bundle lands under the workspace-root target/
          # dir, not apps/desktop/src-tauri/target/, even though `tauri build`
          # was invoked from apps/desktop.
          mkdir -p ci-artifacts
          find target/x86_64-unknown-linux-gnu/release/bundle \
            \( -name '*.deb' -o -name '*.AppImage' \) -exec cp {} ci-artifacts/ \;
          echo "Linux bundle artifacts (name + size):"
          ls -la ci-artifacts
          if [ -z "$(ls -A ci-artifacts)" ]; then
            echo "No .deb/.AppImage found — bundle tree:" >&2
            find target -maxdepth 6 -name bundle -type d >&2 || true
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-linux-x64-bundles
          path: ci-artifacts/*
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp
      - name: cargo test --release (workspace)
        run: cargo test --release --workspace

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          # Workspace-relative dir: Git-Bash's /tmp is invisible to the
          # native-Windows upload-artifact action.
          mkdir -p ci-artifacts
          find target/x86_64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-x64-installers
          path: ci-artifacts/*
          if-no-files-found: error

  # Attempt only — Windows on Arm is far less proven upstream (ort/ONNX
  # Runtime, tauri/wry's WebView2 host, cpal/enigo) than x64. continue-on-error
  # means a failure here never blocks the rest of the workflow; if this job
  # goes consistently red, remove it rather than leave a permanently-failing
  # job in place (see the honesty rule in README's compat matrix).
  windows-arm64:
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: aarch64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp
      - name: cargo test --release (workspace)
        run: cargo test --release --workspace --target aarch64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (arm64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          mkdir -p ci-artifacts
          find target/aarch64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-arm64-installers
          path: ci-artifacts/*
          if-no-files-found: error
