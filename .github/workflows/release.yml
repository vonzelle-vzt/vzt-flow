name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (aarch64, unsigned/local build — no notarization in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Build flow CLI (release)
        run: cargo build --release --target aarch64-apple-darwin -p flow-cli

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Package CLI tarball (flow binary + mcp/dist)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-macos-aarch64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/aarch64-apple-darwin/release/flow "$STAGE/bin/flow"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-macos-aarch64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-aarch64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-macos-aarch64
          path: vzt-flow-cli-macos-aarch64.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          # Workspace-relative dir: Git-Bash's /tmp is invisible to the
          # native-Windows upload-artifact action.
          mkdir -p ci-artifacts
          find target/x86_64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-x64-installers
          path: ci-artifacts/*
          if-no-files-found: error

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dl -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} out/ \;
          ls -la out

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
