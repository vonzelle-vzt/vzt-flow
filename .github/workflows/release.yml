name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      # apple-metal 0.8.8 (pulled in by screencapturekit) compiles a Swift bridge
      # that references MTLSamplerReductionMode, a symbol that exists only in the
      # macOS 26 SDK. GitHub's macOS runners ship several Xcodes and `xcode-select`
      # may default to an older one, so this build was a coin flip: it passed only
      # while rust-cache still held a prebuilt apple-metal, and died with
      # "cannot find 'MTLSamplerReductionMode' in scope" on the first cache miss
      # (the same shape as the OpenSSL bug in this workflow — latent, masked by
      # caching, surfaced by the first cache miss).
      # Pin the newest installed Xcode and fail loudly if its SDK is too old.
      - name: Select newest Xcode (apple-metal needs the macOS 26 SDK)
        run: |
          set -euo pipefail
          # if/else rather than `[ -n "$XC" ] && sudo ...` purely for legibility and
          # so a runner without a versioned Xcode says so out loud. (set -e would
          # NOT abort on the && form: bash exempts a command preceding && from
          # errexit. Verified, rather than assumed.)
          XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then
            sudo xcode-select -s "$XC"
          else
            echo "no /Applications/Xcode_*.app found; using the default toolchain"
          fi
          xcodebuild -version
          SDK=$(xcrun --show-sdk-version)
          echo "selected macOS SDK: $SDK"
          MAJOR=${SDK%%.*}
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::macOS SDK $MAJOR is too old for apple-metal 0.8.8 (needs MTLSamplerReductionMode from the macOS 26 SDK). Xcodes present: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')"
            exit 1
          fi

      - name: OpenSSL headers for llama.cpp vendored httplib (macOS 26 runners)
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "CPATH=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Signing turns on ONLY when the secrets exist. tauri-bundler signs when it
      # sees APPLE_CERTIFICATE + APPLE_CERTIFICATE_PASSWORD (sign.rs:19-40 imports
      # the .p12 into a temp keychain) and notarizes when it also sees APPLE_ID +
      # APPLE_PASSWORD + APPLE_TEAM_ID (sign.rs:99-104). APPLE_SIGNING_IDENTITY
      # REPLACES tauri.conf.json's `signingIdentity` (cli rust.rs:1467), which is
      # why the config can keep "-" as the unsigned fallback: the bundler's
      # keychain() rejects a cert whose identity doesn't contain the configured
      # one, so "-" must not reach it when a real cert is present.
      #
      # Hardened Runtime is REQUIRED for notarization and rides along with the
      # certificate — never on its own. Under it the mic needs
      # com.apple.security.device.audio-input, or the app is denied audio and we
      # reintroduce v0.2.1's "force-quits when I try to talk" by another route.
      # Without secrets we build exactly the ad-hoc, unhardened bundle that
      # v0.2.1 shipped and that is known to work.
      - name: Decide signing mode
        id: signing
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$CERT" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "overlay={\"bundle\":{\"macOS\":{\"hardenedRuntime\":true,\"entitlements\":\"entitlements.plist\"}}}" >> "$GITHUB_OUTPUT"
            echo "::notice::Developer ID secrets present — signing + notarizing, hardened runtime ON"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "overlay=" >> "$GITHUB_OUTPUT"
            echo "::warning::No APPLE_CERTIFICATE secret — building ad-hoc + unnotarized. A browser-downloaded dmg will show 'Apple could not verify', and macOS drops Accessibility/Input Monitoring grants on every upgrade because the ad-hoc cdhash churns."
          fi

      - name: tauri build (aarch64)
        working-directory: apps/desktop
        env:
          SIGNED: ${{ steps.signing.outputs.signed }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # A key declared in `env:` is exported even when the secret behind it
          # does not exist — it arrives as "" rather than absent. tauri-bundler
          # tests these with var_os() (sign.rs:20), for which set-but-empty is
          # present, so it imports an empty .p12 and kills the bundle:
          # "failed to run command security import". Unsetting them is what lets
          # the unsigned path fall through to signingIdentity "-" in
          # tauri.conf.json. Do not replace this with an `env:` expression —
          # every form of it still exports the key.
          if [ "$SIGNED" != "true" ]; then
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                  APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          OVERLAY='${{ steps.signing.outputs.overlay }}'
          if [ -n "$OVERLAY" ]; then
            cargo tauri build --target aarch64-apple-darwin --config "$OVERLAY"
          else
            cargo tauri build --target aarch64-apple-darwin
          fi

      - name: Build flow CLI (release)
        run: cargo build --release --target aarch64-apple-darwin -p flow-cli

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      # Two regressions shipped to users before this guard existed, both
      # invisible on the maintainer's machine:
      #   1. No NSMicrophoneUsageDescription. macOS TCC *terminates* a process
      #      that opens a mic stream with no purpose string. It never bit the
      #      maintainer because a Terminal-launched binary inherits Terminal as
      #      its TCC responsible process, and Terminal already has mic access.
      #   2. The bundle was only linker-signed (Sealed Resources=none). A
      #      frontier diagnosis found the original comment here overstated
      #      the TCC impact — grants ARE recorded against ad-hoc/linker-signed
      #      builds (pinned by cdhash via csreq) and persist fine for a fixed
      #      released binary; they only break across *rebuilds* (a separate,
      #      already-documented cdhash-churn gotcha, see CLAUDE.md (a)). What
      #      an unsealed bundle actually breaks is Gatekeeper: a quarantined
      #      copy (browser download, or a `brew` cask, which quarantines by
      #      default) fails `gktool scan` with "the software has been
      #      altered" — the un-bypassable "VZT Flow is damaged and can't be
      #      opened" dialog, no "Open Anyway" escape hatch. (`curl | bash`
      #      only escapes it because curl never sets the quarantine xattr.)
      #      Only the x86_64 job ever re-signed, and even there the fix-up
      #      ran on the ALREADY-BUILT .app while the .dmg had already been
      #      produced from the pre-fixup bundle — the guard below inspects
      #      the .app INSIDE the shipped .dmg, not the one left behind in
      #      bundle/macos/, so it can't be fooled by that ordering bug again.
      # Both are now fixed at the source (src-tauri/Info.plist +
      # bundle.macOS.signingIdentity). Fail the release if either regresses.
      # ORDERING CONSTRAINT for anyone touching the x64 job: any mutation of
      # the .app (copying the onnxruntime dylib in, adding rpaths) must
      # happen BEFORE codesign, codesign must be the last mutation, and dmg
      # creation must come after signing — cargo-tauri's own dmg bundling
      # step already does all three in that order via the frameworks/
      # signingIdentity config, so do not add a second post-build mutation
      # pass that edits the .app after the dmg has already been cut from it.
      - name: Verify bundle (mounts the shipped .dmg — the actual artifact users download)
        run: |
          set -euo pipefail
          DMG="${{ steps.find_dmg.outputs.path }}"
          MOUNT=$(mktemp -d)
          cleanup() { hdiutil detach "$MOUNT" -quiet >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT" "$DMG"

          APP=$(find "$MOUNT" -maxdepth 1 -name '*.app' | head -n1)
          [ -n "$APP" ] || { echo "::error::no .app found inside $DMG"; exit 1; }

          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$APP/Contents/Info.plist" >/dev/null 2>&1 \
            || { echo "::error::NSMicrophoneUsageDescription missing from the shipped dmg's app — the app will be killed by TCC the moment a user talks"; exit 1; }

          if codesign -dv --verbose=2 "$APP" 2>&1 | grep -q "Sealed Resources=none"; then
            echo "::error::shipped dmg's bundle resources are not sealed — a quarantined download will fail Gatekeeper (\"app is damaged\") with no Open Anyway option"
            exit 1
          fi
          codesign --verify --deep --strict "$APP" \
            || { echo "::error::shipped dmg's bundle signature does not verify"; exit 1; }

          # ScreenCaptureKit is HARD-linked (LC_LOAD_DYLIB, not weak) and its audio
          # capture is macOS 13.0+. Shipping a lower LSMinimumSystemVersion lets an
          # older Mac install the app and then dyld-abort at launch — no dialog, just
          # a bouncing icon. Same failure class as the Intel onnxruntime dyld abort.
          MINOS=$(/usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "$APP/Contents/Info.plist" 2>/dev/null || echo "")
          [ "$MINOS" = "13.0" ] \
            || { echo "::error::aarch64 LSMinimumSystemVersion is '$MINOS', expected 13.0 — ScreenCaptureKit is hard-linked and needs 13.0+; a lower floor lets older Macs install an app that dyld-aborts at launch"; exit 1; }

          # When we sign for real, prove it. An unsigned or unstapled build that
          # slips through looks identical to a good one until a user downloads it.
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            codesign -dv --verbose=4 "$APP" 2>&1 | grep -q "Authority=Developer ID Application" \
              || { echo "::error::signing was enabled but the shipped app is not Developer ID signed"; exit 1; }
            codesign -dv --verbose=2 "$APP" 2>&1 | grep -q "flags=.*runtime" \
              || { echo "::error::Developer ID build is missing the hardened runtime flag — notarization will reject it"; exit 1; }
            codesign -d --entitlements - --xml "$APP" 2>/dev/null | grep -q "com.apple.security.device.audio-input" \
              || { echo "::error::hardened runtime without com.apple.security.device.audio-input — the app will be denied the microphone"; exit 1; }
            spctl -a -vv "$APP" 2>&1 | grep -q "accepted" \
              || { echo "::error::Gatekeeper rejects the signed app (spctl)"; exit 1; }
            xcrun stapler validate "$DMG" \
              || { echo "::error::notarization ticket is not stapled to the dmg — users on a fresh Mac will still see a Gatekeeper prompt"; exit 1; }
            echo "signed OK: Developer ID, hardened runtime, audio-input entitlement, spctl accepted, ticket stapled"
          else
            echo "::warning::unsigned (ad-hoc) build — see 'Decide signing mode'"
          fi

          echo "bundle OK (verified inside shipped dmg): mic purpose string present, resources sealed, signature verifies, minimumSystemVersion=$MINOS"

      - name: Prune MCP node_modules to production deps
        # dist/index.js imports @modelcontextprotocol/sdk and zod at
        # runtime — those live in node_modules, not dist/, so the release
        # tarball needs them alongside dist/ or `node dist/index.js` fails
        # with ERR_MODULE_NOT_FOUND on a machine that never ran `npm ci`.
        # `npm ci` above installed devDependencies too (needed for the
        # `npm run build` typecheck/compile); prune them now that dist/
        # is already built.
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-macos-aarch64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/aarch64-apple-darwin/release/flow "$STAGE/bin/flow"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-macos-aarch64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-aarch64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-macos-aarch64
          path: vzt-flow-cli-macos-aarch64.tar.gz
          if-no-files-found: error

  # Intel Mac — see build.yml's macos-x64 job for the full rationale
  # (no Metal, no ort prebuilt binaries so we link Microsoft's official
  # osx-x86_64 ONNX Runtime release via ORT_STRATEGY=system, and the
  # resulting @rpath reference needs an rpath added by hand). Cross-compiled
  # from the arm64 macos-latest runner; never run on real or emulated Intel
  # hardware.
  macos-x64:
    runs-on: macos-latest
    env:
      ORT_STRATEGY: system
      ORT_PREFER_DYNAMIC_LINK: "1"
      ONNXRUNTIME_VERSION: "1.22.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Download Microsoft's official ONNX Runtime (osx-x86_64) — ort has no prebuilt binaries for this target
        run: |
          mkdir -p /tmp/ort-x64
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-osx-x86_64-${ONNXRUNTIME_VERSION}.tgz" \
            | tar xz -C /tmp/ort-x64 --strip-components=1
          echo "ORT_LIB_PATH=/tmp/ort-x64/lib" >> "$GITHUB_ENV"
          DYLIB=$(find /tmp/ort-x64/lib -name 'libonnxruntime.*.dylib' | head -n1)
          [ -n "$DYLIB" ] || { echo "::error::libonnxruntime dylib not found under /tmp/ort-x64/lib after extracting the release tarball"; exit 1; }
          echo "ORT_DYLIB=$DYLIB" >> "$GITHUB_ENV"

      # apple-metal 0.8.8 (pulled in by screencapturekit) compiles a Swift bridge
      # that references MTLSamplerReductionMode, a symbol that exists only in the
      # macOS 26 SDK. GitHub's macOS runners ship several Xcodes and `xcode-select`
      # may default to an older one, so this build was a coin flip: it passed only
      # while rust-cache still held a prebuilt apple-metal, and died with
      # "cannot find 'MTLSamplerReductionMode' in scope" on the first cache miss
      # (the same shape as the OpenSSL bug in this workflow — latent, masked by
      # caching, surfaced by the first cache miss).
      # Pin the newest installed Xcode and fail loudly if its SDK is too old.
      - name: Select newest Xcode (apple-metal needs the macOS 26 SDK)
        run: |
          set -euo pipefail
          # if/else rather than `[ -n "$XC" ] && sudo ...` purely for legibility and
          # so a runner without a versioned Xcode says so out loud. (set -e would
          # NOT abort on the && form: bash exempts a command preceding && from
          # errexit. Verified, rather than assumed.)
          XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then
            sudo xcode-select -s "$XC"
          else
            echo "no /Applications/Xcode_*.app found; using the default toolchain"
          fi
          xcodebuild -version
          SDK=$(xcrun --show-sdk-version)
          echo "selected macOS SDK: $SDK"
          MAJOR=${SDK%%.*}
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::macOS SDK $MAJOR is too old for apple-metal 0.8.8 (needs MTLSamplerReductionMode from the macOS 26 SDK). Xcodes present: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')"
            exit 1
          fi

      - name: OpenSSL headers for llama.cpp vendored httplib (macOS 26 runners)
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "CPATH=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # The previous version of this step built the .app AND cut the .dmg in
      # one `cargo tauri build` call, then a later step mutated the already-
      # built .app in bundle/macos/ — but the .dmg had already been packaged
      # from the PRE-fixup app, so every shipped Intel dmg contained an
      # unsigned app with no bundled onnxruntime dylib and no rpath to find
      # it (verified against the v0.2.0 x64 dmg: unsigned, no
      # Contents/Frameworks, LC_RPATH only /usr/lib/swift — every Intel user
      # aborted at dyld load on every launch). Fixed by doing both mutations
      # BEFORE the bundler cuts the dmg instead of after:
      #   - RUSTFLAGS adds the rpath at link time (the bundler's --config
      #     frameworks option does NOT run install_name_tool for you).
      #   - --config bundle.macOS.frameworks tells the bundler to copy the
      #     dylib into Contents/Frameworks and include it in sign_paths, so
      #     the bundler's own signing (bundle.macOS.signingIdentity: "-" in
      #     tauri.conf.json) covers it and the dmg it cuts already has both.
      # RUSTFLAGS and --config are scoped to this step only — arm64
      # statically links ort and has no frameworks entry to add.
      # Same gate as the aarch64 job — see the comment there. Signing and hardened
      # runtime arrive together, only when the certificate secret exists.
      - name: Decide signing mode
        id: signing
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$CERT" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: tauri build (x86_64, onnxruntime bundled + rpath — cross-compiled)
        working-directory: apps/desktop
        env:
          # An env RUSTFLAGS *replaces* .cargo/config.toml's `rustflags`, it
          # does not append to them (verified: with only the @executable_path
          # entry here, the built binary's sole LC_RPATH became
          # @executable_path/../Frameworks and /usr/lib/swift vanished). That
          # config entry is load-bearing — screencapturekit pulls in
          # Swift-backed crates needing libswift_Concurrency.dylib from
          # /usr/lib/swift. Dropping it would trade the onnxruntime dyld abort
          # for a libswift_Concurrency one. Carry BOTH rpaths.
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,/usr/lib/swift -C link-arg=-Wl,-rpath,@executable_path/../Frameworks"
          SIGNED: ${{ steps.signing.outputs.signed }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # `--config` DEEP-merges into tauri.conf.json ("merge with the default
          # configuration file", per `tauri build --help`), so signingIdentity and
          # hardenedRuntime from the file survive this overlay. Empirical proof:
          # v0.2.1's Intel dmg passed the seal + signature guard while this overlay
          # was already active. Do not restate those keys here.
          #
          # minimumSystemVersion is overridden to 13.3 for INTEL ONLY. The bundled
          # onnxruntime-osx-x86_64-1.22.0 dylib has LC_BUILD_VERSION minos 13.3, so
          # dyld refuses to load it below that. tauri.conf.json carries 13.0, which
          # is the correct Apple Silicon floor (ScreenCaptureKit is hard-linked, and
          # its audio capture is 13.0+). That key is not arch-aware, hence the
          # per-target override here.
          #
          # A key declared in `env:` is exported even when the secret behind it
          # does not exist — it arrives as "" rather than absent. tauri-bundler
          # tests these with var_os() (sign.rs:20), for which set-but-empty is
          # present, so it imports an empty .p12 and kills the bundle:
          # "failed to run command security import". Unsetting them is what lets
          # the unsigned path fall through to signingIdentity "-" in
          # tauri.conf.json. Do not replace this with an `env:` expression —
          # every form of it still exports the key.
          if [ "$SIGNED" != "true" ]; then
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                  APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          # Composed with jq so the signing keys MERGE into this overlay rather
          # than a second --config replacing it. hardenedRuntime + entitlements
          # only appear when a certificate exists (see "Decide signing mode").
          OVERLAY=$(jq -nc --arg dylib "$ORT_DYLIB" --arg signed "$SIGNED" '
            { bundle: { macOS: (
                { frameworks: [$dylib], minimumSystemVersion: "13.3" }
                + (if $signed == "true"
                   then { hardenedRuntime: true, entitlements: "entitlements.plist" }
                   else {} end)
            ) } }')
          echo "config overlay: $OVERLAY"
          cargo tauri build --target x86_64-apple-darwin --config "$OVERLAY"

      - name: Build flow CLI (release)
        run: cargo build --release --target x86_64-apple-darwin -p flow-cli

      - name: Stage onnxruntime dylib + rpath for the standalone CLI tarball
        # The CLI binary ships with no app bundle, so it isn't covered by
        # the bundler's frameworks/signing above — stage the dylib alongside
        # it by hand and point a matching rpath at it.
        run: |
          mkdir -p cli-x64-stage/lib
          cp "$ORT_DYLIB" cli-x64-stage/lib/
          cp target/x86_64-apple-darwin/release/flow cli-x64-stage/flow
          install_name_tool -add_rpath "@executable_path/lib" cli-x64-stage/flow
          codesign --force -s - cli-x64-stage/flow

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          DMG=$(find target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      # Same guard shape as the aarch64 job (mounts the shipped .dmg, not the
      # .app left behind in bundle/macos/) plus x64-specific checks that the
      # onnxruntime dylib and its rpath actually made it into the dmg.
      - name: Verify bundle (mounts the shipped .dmg — the actual artifact users download)
        run: |
          set -euo pipefail
          DMG="${{ steps.find_dmg.outputs.path }}"
          MOUNT=$(mktemp -d)
          cleanup() { hdiutil detach "$MOUNT" -quiet >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT" "$DMG"

          APP=$(find "$MOUNT" -maxdepth 1 -name '*.app' | head -n1)
          [ -n "$APP" ] || { echo "::error::no .app found inside $DMG"; exit 1; }

          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$APP/Contents/Info.plist" >/dev/null 2>&1 \
            || { echo "::error::NSMicrophoneUsageDescription missing from the shipped dmg's app — the app will be killed by TCC the moment a user talks"; exit 1; }

          if codesign -dv --verbose=2 "$APP" 2>&1 | grep -q "Sealed Resources=none"; then
            echo "::error::shipped dmg's bundle resources are not sealed — a quarantined download will fail Gatekeeper (\"app is damaged\") with no Open Anyway option"
            exit 1
          fi
          codesign --verify --deep --strict "$APP" \
            || { echo "::error::shipped dmg's bundle signature does not verify"; exit 1; }

          DYLIB=$(find "$APP/Contents/Frameworks" -maxdepth 1 -name 'libonnxruntime.*.dylib' 2>/dev/null | head -n1)
          [ -n "$DYLIB" ] || { echo "::error::libonnxruntime dylib missing from shipped dmg's Contents/Frameworks — the app will abort at dyld load"; exit 1; }
          RPATHS=$(otool -l "$APP/Contents/MacOS/vzt-flow-desktop" | grep -A2 LC_RPATH | grep "path " || true)
          grep -q "@executable_path/../Frameworks" <<<"$RPATHS" \
            || { echo "::error::shipped dmg's binary has no @executable_path/../Frameworks LC_RPATH — dyld will fail to locate libonnxruntime at launch"; exit 1; }
          # An env RUSTFLAGS on the build step replaces .cargo/config.toml's
          # rustflags outright, which silently drops this one. Without it,
          # libswift_Concurrency.dylib (screencapturekit -> Swift crates) is
          # unresolvable and the app dyld-aborts just as surely.
          grep -q "/usr/lib/swift" <<<"$RPATHS" \
            || { echo "::error::shipped dmg's binary lost its /usr/lib/swift LC_RPATH — dyld will fail on libswift_Concurrency.dylib. Did an env RUSTFLAGS clobber .cargo/config.toml?"; exit 1; }

          # Intel's real floor is 13.3, not the 13.0 in tauri.conf.json: the bundled
          # onnxruntime dylib above has LC_BUILD_VERSION minos 13.3, so dyld refuses
          # to load it on anything older. The build step's --config overlay sets this;
          # if the overlay is ever dropped the app silently ships a 13.0 floor and
          # dyld-aborts on 13.0-13.2.
          MINOS=$(/usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "$APP/Contents/Info.plist" 2>/dev/null || echo "")
          [ "$MINOS" = "13.3" ] \
            || { echo "::error::x86_64 LSMinimumSystemVersion is '$MINOS', expected 13.3 — the bundled onnxruntime dylib is minos 13.3 and dyld will refuse to load it below that. Did the --config minimumSystemVersion overlay get dropped?"; exit 1; }

          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            codesign -dv --verbose=4 "$APP" 2>&1 | grep -q "Authority=Developer ID Application" \
              || { echo "::error::signing was enabled but the shipped Intel app is not Developer ID signed"; exit 1; }
            codesign -d --entitlements - --xml "$APP" 2>/dev/null | grep -q "com.apple.security.device.audio-input" \
              || { echo "::error::hardened runtime without com.apple.security.device.audio-input — the app will be denied the microphone"; exit 1; }
            # Hardened runtime enables library validation, which rejects a dylib not
            # signed by the host's Team ID. The bundled onnxruntime is signed by the
            # bundler with our identity, so it should validate — but assert the
            # escape hatch is present until an Intel Mac has actually launched it.
            codesign -d --entitlements - --xml "$APP" 2>/dev/null | grep -q "com.apple.security.cs.disable-library-validation" \
              || echo "::warning::Intel hardened build has no disable-library-validation entitlement; if the bundled libonnxruntime fails to load, that is why"
            spctl -a -vv "$APP" 2>&1 | grep -q "accepted" \
              || { echo "::error::Gatekeeper rejects the signed Intel app (spctl)"; exit 1; }
            xcrun stapler validate "$DMG" \
              || { echo "::error::notarization ticket is not stapled to the Intel dmg"; exit 1; }
            echo "signed OK (Intel): Developer ID, audio-input entitlement, spctl accepted, ticket stapled"
          fi

          echo "bundle OK (verified inside shipped dmg): mic purpose string present, resources sealed, signature verifies, onnxruntime dylib + rpath present, minimumSystemVersion=$MINOS"

      - name: Prune MCP node_modules to production deps
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + bundled onnxruntime dylib + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-macos-x86_64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp cli-x64-stage/flow "$STAGE/bin/flow"
          mkdir -p "$STAGE/bin/lib"
          cp cli-x64-stage/lib/libonnxruntime.*.dylib "$STAGE/bin/lib/"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server (Intel Mac build)

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime. This
          is the Intel (x86_64) build: no Metal/CoreML, CPU-only inference —
          see the README hardware compat matrix.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-macos-x86_64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-x86_64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-macos-x86_64
          path: vzt-flow-cli-macos-x86_64.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          # Workspace-relative dir: Git-Bash's /tmp is invisible to the
          # native-Windows upload-artifact action.
          mkdir -p ci-artifacts
          find target/x86_64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-x64-installers
          path: ci-artifacts/*
          if-no-files-found: error

      # Windows needs none of the macos-x64 job's ORT_STRATEGY=system dance —
      # `ort` ships prebuilt binaries for x86_64-pc-windows-msvc, so this job
      # has no env: block and builds the CLI the same simple shape as the
      # `linux` job (build, smoke-test, prune, tar). Without this, Windows
      # ships only the .msi/.exe desktop app: no flow.exe, no MCP server, and
      # since only the CLI can download the Parakeet ASR model, a Windows
      # user has no path to a working install short of building from source.
      - name: Build flow CLI (release)
        run: cargo build --release --target x86_64-pc-windows-msvc -p flow-cli

      - name: Verify CLI binary runs (smoke check)
        shell: bash
        run: |
          set -euo pipefail
          OUT="$(./target/x86_64-pc-windows-msvc/release/flow.exe --version)"
          echo "flow.exe --version: $OUT"
          echo "$OUT" | grep -q "^flow " \
            || { echo "::error::flow.exe --version did not print the expected 'flow <version>' output — binary may not link/run on Windows"; exit 1; }

      - name: Prune MCP node_modules to production deps
        # See the macos/linux jobs' identical step: dist/index.js imports
        # @modelcontextprotocol/sdk and zod at runtime, so the release
        # tarball needs node_modules alongside dist/.
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow.exe + mcp/dist + mcp/node_modules)
        # GitHub's windows-latest runners ship bsdtar and bash (Git for
        # Windows), so this mirrors the linux job's heredoc + tar shape
        # exactly instead of reimplementing it in PowerShell/Compress-Archive
        # (which doesn't produce .tar.gz anyway).
        shell: bash
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-windows-x86_64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/x86_64-pc-windows-msvc/release/flow.exe "$STAGE/bin/flow.exe"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server (Windows build)

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-windows-x86_64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-windows-x86_64
          path: vzt-flow-cli-windows-x86_64.tar.gz
          if-no-files-found: error

  # Attempt only — see build.yml's windows-arm64 job for the rationale.
  # continue-on-error means the `release` job below still proceeds (and
  # still picks up this job's installers if it succeeds) even if this job
  # fails outright.
  windows-arm64:
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: aarch64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (arm64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          mkdir -p ci-artifacts
          find target/aarch64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-arm64-installers
          path: ci-artifacts/*
          if-no-files-found: error

  # Linux x64 — see build.yml's `linux` job and docs/USAGE-Linux.md for the
  # honest support matrix (built/tested in CI, never run on real Linux
  # hardware; X11 full, Wayland degraded). Ships a .deb, an .AppImage, and a
  # standalone CLI tarball (flow binary + MCP server) mirroring the macOS one.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-unknown-linux-gnu
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Linux system dependencies (Tauri/WebKitGTK, tray appindicator, ALSA, X11 paste)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, .deb + .AppImage)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Build flow CLI (release)
        run: cargo build --release --target x86_64-unknown-linux-gnu -p flow-cli

      - name: Collect deb/AppImage artifacts
        run: |
          mkdir -p out
          find target/x86_64-unknown-linux-gnu/release/bundle \
            \( -name '*.deb' -o -name '*.AppImage' \) -exec cp {} out/ \;
          echo "Linux bundle artifacts (name + size):"
          ls -la out
          if [ -z "$(ls -A out)" ]; then
            echo "No .deb/.AppImage found — bundle tree:" >&2
            find target -maxdepth 6 -name bundle -type d >&2 || true
            exit 1
          fi

      - name: Prune MCP node_modules to production deps
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-linux-x86_64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/x86_64-unknown-linux-gnu/release/flow "$STAGE/bin/flow"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server (Linux build)

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime. See
          docs/USAGE-Linux.md for the X11-vs-Wayland support matrix.
          EOF
          tar -C "$(dirname "$STAGE")" -czf out/vzt-flow-cli-linux-x86_64.tar.gz "$(basename "$STAGE")"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-linux-x64-bundles
          path: out/*
          if-no-files-found: error

  release:
    needs: [macos, macos-x64, windows, windows-arm64, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dl -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.exe' \
            -o -name '*.deb' -o -name '*.AppImage' \) \
            -exec cp {} out/ \;
          ls -la out

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
