name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (aarch64, unsigned/local build — no notarization in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Build flow CLI (release)
        run: cargo build --release --target aarch64-apple-darwin -p flow-cli

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Prune MCP node_modules to production deps
        # dist/index.js imports @modelcontextprotocol/sdk and zod at
        # runtime — those live in node_modules, not dist/, so the release
        # tarball needs them alongside dist/ or `node dist/index.js` fails
        # with ERR_MODULE_NOT_FOUND on a machine that never ran `npm ci`.
        # `npm ci` above installed devDependencies too (needed for the
        # `npm run build` typecheck/compile); prune them now that dist/
        # is already built.
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-macos-aarch64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/aarch64-apple-darwin/release/flow "$STAGE/bin/flow"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-macos-aarch64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-aarch64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-macos-aarch64
          path: vzt-flow-cli-macos-aarch64.tar.gz
          if-no-files-found: error

  # Intel Mac — see build.yml's macos-x64 job for the full rationale
  # (no Metal, no ort prebuilt binaries so we link Microsoft's official
  # osx-x86_64 ONNX Runtime release via ORT_STRATEGY=system, and the
  # resulting @rpath reference needs an rpath added by hand). Cross-compiled
  # from the arm64 macos-latest runner; never run on real or emulated Intel
  # hardware.
  macos-x64:
    runs-on: macos-latest
    env:
      ORT_STRATEGY: system
      ORT_PREFER_DYNAMIC_LINK: "1"
      ONNXRUNTIME_VERSION: "1.22.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Download Microsoft's official ONNX Runtime (osx-x86_64) — ort has no prebuilt binaries for this target
        run: |
          mkdir -p /tmp/ort-x64
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-osx-x86_64-${ONNXRUNTIME_VERSION}.tgz" \
            | tar xz -C /tmp/ort-x64 --strip-components=1
          echo "ORT_LIB_PATH=/tmp/ort-x64/lib" >> "$GITHUB_ENV"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x86_64, unsigned/local build — no notarization in CI, cross-compiled)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Build flow CLI (release)
        run: cargo build --release --target x86_64-apple-darwin -p flow-cli

      - name: Bundle libonnxruntime.dylib into the .app and the CLI, fix up rpaths
        run: |
          APP_PATH=$(find target/x86_64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" >&2
            exit 1
          fi
          DYLIB=$(find /tmp/ort-x64/lib -name 'libonnxruntime.*.dylib' | head -n1)
          mkdir -p "$APP_PATH/Contents/Frameworks"
          cp "$DYLIB" "$APP_PATH/Contents/Frameworks/"
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP_PATH/Contents/MacOS/vzt-flow-desktop"
          codesign --force --deep -s - "$APP_PATH"

          # The CLI binary is standalone (no bundle) — ship the dylib
          # alongside it in the release tarball and point the rpath there.
          mkdir -p cli-x64-stage/lib
          cp "$DYLIB" cli-x64-stage/lib/
          cp target/x86_64-apple-darwin/release/flow cli-x64-stage/flow
          install_name_tool -add_rpath "@executable_path/lib" cli-x64-stage/flow
          codesign --force -s - cli-x64-stage/flow

      - name: Locate dmg artifact
        id: find_dmg
        run: |
          DMG=$(find target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — bundle tree:" >&2
            find target -maxdepth 5 -name bundle -type d >&2 || true
            exit 1
          fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Prune MCP node_modules to production deps
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + bundled onnxruntime dylib + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-macos-x86_64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp cli-x64-stage/flow "$STAGE/bin/flow"
          mkdir -p "$STAGE/bin/lib"
          cp cli-x64-stage/lib/libonnxruntime.*.dylib "$STAGE/bin/lib/"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server (Intel Mac build)

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime. This
          is the Intel (x86_64) build: no Metal/CoreML, CPU-only inference —
          see the README hardware compat matrix.
          EOF
          tar -C "$(dirname "$STAGE")" -czf vzt-flow-cli-macos-x86_64.tar.gz "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-macos-x86_64-dmg
          path: ${{ steps.find_dmg.outputs.path }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-cli-macos-x86_64
          path: vzt-flow-cli-macos-x86_64.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          # Cargo workspace: the bundle lands under the workspace-root
          # target/ dir, not apps/desktop/src-tauri/target/, even though
          # `tauri build` was invoked from apps/desktop.
          # Workspace-relative dir: Git-Bash's /tmp is invisible to the
          # native-Windows upload-artifact action.
          mkdir -p ci-artifacts
          find target/x86_64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-x64-installers
          path: ci-artifacts/*
          if-no-files-found: error

  # Attempt only — see build.yml's windows-arm64 job for the rationale.
  # continue-on-error means the `release` job below still proceeds (and
  # still picks up this job's installers if it succeeds) even if this job
  # fails outright.
  windows-arm64:
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: aarch64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (arm64, unsigned — no code signing in CI)
        working-directory: apps/desktop
        run: cargo tauri build --target aarch64-pc-windows-msvc

      - name: Locate msi/nsis artifacts
        id: find_installers
        shell: bash
        run: |
          mkdir -p ci-artifacts
          find target/aarch64-pc-windows-msvc/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ci-artifacts/ \;
          ls -la ci-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-windows-arm64-installers
          path: ci-artifacts/*
          if-no-files-found: error

  # Linux x64 — see build.yml's `linux` job and docs/USAGE-Linux.md for the
  # honest support matrix (built/tested in CI, never run on real Linux
  # hardware; X11 full, Wayland degraded). Ships a .deb, an .AppImage, and a
  # standalone CLI tarball (flow binary + MCP server) mirroring the macOS one.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: x86_64-unknown-linux-gnu
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Linux system dependencies (Tauri/WebKitGTK, tray appindicator, ALSA, X11 paste)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev
      - name: Install frontend/MCP dependencies
        run: |
          npm ci --prefix apps/desktop
          npm ci --prefix mcp
          npm run build --prefix mcp

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: tauri build (x64, .deb + .AppImage)
        working-directory: apps/desktop
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Build flow CLI (release)
        run: cargo build --release --target x86_64-unknown-linux-gnu -p flow-cli

      - name: Collect deb/AppImage artifacts
        run: |
          mkdir -p out
          find target/x86_64-unknown-linux-gnu/release/bundle \
            \( -name '*.deb' -o -name '*.AppImage' \) -exec cp {} out/ \;
          echo "Linux bundle artifacts (name + size):"
          ls -la out
          if [ -z "$(ls -A out)" ]; then
            echo "No .deb/.AppImage found — bundle tree:" >&2
            find target -maxdepth 6 -name bundle -type d >&2 || true
            exit 1
          fi

      - name: Prune MCP node_modules to production deps
        working-directory: mcp
        run: npm prune --omit=dev

      - name: Package CLI tarball (flow binary + mcp/dist + mcp/node_modules)
        run: |
          STAGE=$(mktemp -d)/vzt-flow-cli-linux-x86_64
          mkdir -p "$STAGE/bin" "$STAGE/mcp"
          cp target/x86_64-unknown-linux-gnu/release/flow "$STAGE/bin/flow"
          cp -R mcp/dist "$STAGE/mcp/dist"
          cp -R mcp/node_modules "$STAGE/mcp/node_modules"
          cp mcp/package.json "$STAGE/mcp/package.json"
          cat > "$STAGE/mcp/README-snippet.md" <<'EOF'
          # VZT Flow MCP server (Linux build)

          Register with Claude Code:

              claude mcp add vzt-flow --scope user -- node <path-to>/mcp/dist/index.js

          The `flow` CLI must be on your PATH (or set VZT_FLOW_BIN) for the
          MCP server's listen/transcribe tools to work. node_modules/ is
          bundled alongside dist/ — dist/index.js needs it at runtime. See
          docs/USAGE-Linux.md for the X11-vs-Wayland support matrix.
          EOF
          tar -C "$(dirname "$STAGE")" -czf out/vzt-flow-cli-linux-x86_64.tar.gz "$(basename "$STAGE")"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: vzt-flow-linux-x64-bundles
          path: out/*
          if-no-files-found: error

  release:
    needs: [macos, macos-x64, windows, windows-arm64, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dl -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.exe' \
            -o -name '*.deb' -o -name '*.AppImage' \) \
            -exec cp {} out/ \;
          ls -la out

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
