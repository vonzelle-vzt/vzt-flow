<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>VZT Flow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    cursor: default;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  }
  #pill {
    width: 220px;
    height: 64px;
    box-sizing: border-box;
    background: rgba(20, 20, 26, 0.86);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 0 16px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  }
  /* The main row (dot/bars/timer) — the pill's original horizontal layout,
     now nested so a rolling-preview line can sit under it. */
  #main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  /* Rolling live-preview strip (Feature B): a subdued one-line tail of the
     raw transcript so far, under the timer during a long recording. Hidden
     unless a preview has arrived. Deliberately dim + italic to read as
     provisional, pre-cleanup text. */
  #preview {
    display: none;
    max-width: 100%;
    font-size: 10px;
    line-height: 12px;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #preview.show { display: block; }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ff453a;
    flex-shrink: 0;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.82); }
  }
  #bars {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    /* Was `flex: 1`, which greedily claimed all free space in the pill and
       left #label (the elapsed-time mm:ss readout) squeezed down to a
       couple characters via text-overflow ellipsis. Shrinkable but not
       growing, so #label gets first claim on any slack instead. */
    flex: 0 1 auto;
  }
  #bars span {
    display: block;
    width: 3px;
    min-height: 4px;
    border-radius: 2px;
    background: #5ee7ff;
    transition: height 60ms linear;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 3px solid rgba(94, 231, 255, 0.25);
    border-top-color: #5ee7ff;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check {
    width: 22px;
    height: 22px;
    color: #6bffa1;
  }
  #label {
    color: rgba(255, 255, 255, 0.82);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    /* Guarantees room for "9:59"-width elapsed-time text (and most mode
       badges) without being squeezed to nothing by #bars — see #bars'
       comment for the bug this fixes. */
    flex: 1 1 auto;
    min-width: 34px;
  }
  #pill.hidden { display: none; }
  /* Last-30s-before-the-cap heads-up for long-form holds: a subtle amber
     tint rather than a jarring color flip, since this fires during normal
     use (a full 10min hold), not an error state. */
  #pill.warning {
    background: rgba(46, 30, 10, 0.9);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 159, 10, 0.35);
  }
  #pill.warning .dot {
    background: #ff9f0a;
  }
  #pill.warning #label {
    color: #ffc36b;
  }
</style>
</head>
<body>
  <div id="pill" class="hidden">
    <div id="main">
      <div id="leading"></div>
      <div id="bars"></div>
      <div id="label"></div>
    </div>
    <div id="preview"></div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
